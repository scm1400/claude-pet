appId: com.claudemama.app
productName: Claude Mama
directories:
  output: release
files:
  - dist/**/*
  - package.json
  - "!dist/renderer/**/*.map"
asar: true
publish:
  provider: github
  owner: scm1400
  repo: claude-mama
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.png
  category: public.app-category.utilities
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp
  uninstallerHeader: build/installerHeader.bmp
dmg:
  writeUpdateInfo: false
  background: build/dmg-background.png
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 250
      type: file
    - x: 400
      y: 250
      type: link
      path: /Applications
extraResources:
  - from: build/tray-icon.png
    to: tray-icon.png
extraMetadata:
  main: dist/main/main/main.js
